services:
  db:
    image: postgres:17-alpine
    container_name: devsroom_conversionflow
    restart: always
    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: wpmhs
      POSTGRES_PASSWORD: Clay125524
      POSTGRES_DB: devsroom_conversionflow_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpmhs -d devsroom_conversionflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: devsroom_conversionflow_redis
    restart: always
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
